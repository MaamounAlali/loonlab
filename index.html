  <style>
    :root {
      --bg-1: #fff6cf;
      --bg-2: #e7f8ff;
      --card: rgba(255, 255, 255, 0.9);
      --text: #17324d;
      --muted: #58708a;
      --line: rgba(23, 50, 77, 0.14);
      --shadow: 0 14px 34px rgba(23, 50, 77, 0.16);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --gap: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 12%, rgba(255,255,255,.45), transparent 30%),
        radial-gradient(circle at 90% 18%, rgba(255,255,255,.28), transparent 28%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      user-select: none;
      -webkit-user-select: none;
      transition: background 320ms ease;
    }

    button {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(1100px, calc(100% - 24px));
      min-height: 100dvh;
      margin: 0 auto;
      padding: max(10px, env(safe-area-inset-top)) 0 max(10px, env(safe-area-inset-bottom));
      display: grid;
      grid-template-rows: auto 1fr;
      gap: var(--gap);
    }

    .top-bar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: var(--gap);
      align-items: center;
    }

    .title-card,
    .score-card,
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .title-card {
      padding: 14px 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 54px;
      height: 54px;
      flex: 0 0 54px;
      border-radius: 18px;
      box-shadow: 0 10px 24px rgba(23, 50, 77, .18);
      background: #fff;
    }

    .install-hint {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(34, 197, 94, .13);
      color: #166534;
      font-size: .78rem;
      font-weight: 950;
      line-height: 1.2;
    }

    .title-card h1 {
      margin: 0;
      font-size: clamp(1.3rem, 4vw, 2.4rem);
      line-height: 1.1;
    }

    .title-card p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.45;
      font-weight: 750;
    }

    .score-card {
      min-width: 92px;
      height: 86px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 8px;
    }

    .score-label {
      color: var(--muted);
      font-size: .8rem;
      font-weight: 900;
    }

    .score-value {
      font-size: 2.25rem;
      line-height: 1;
      font-weight: 950;
    }

    .game {
      min-height: 0;
      display: grid;
      grid-template-columns: .9fr 1.15fr;
      gap: var(--gap);
    }

    .panel {
      min-height: 0;
      padding: 14px;
      overflow: hidden;
    }

    .palette {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
    }

    .section-title {
      margin: 0;
      font-size: 1.12rem;
      line-height: 1.2;
    }

    .colors {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .color-token {
      border: 0;
      border-radius: 24px;
      color: #fff;
      font-weight: 950;
      font-size: 1.02rem;
      cursor: grab;
      touch-action: none;
      box-shadow: 0 10px 22px rgba(0, 0, 0, .16);
      position: relative;
      overflow: hidden;
      transition: transform 150ms ease, box-shadow 150ms ease, opacity 150ms ease;
    }

    .color-token::after {
      content: "";
      position: absolute;
      inset: 9px;
      border-radius: 18px;
      border: 2px solid rgba(255,255,255,.38);
      pointer-events: none;
    }

    .color-token:active {
      transform: scale(.96);
      cursor: grabbing;
    }

    .color-token.is-used {
      opacity: .48;
      transform: scale(.95);
    }

    .red { background: #ef4444; }
    .yellow { background: #facc15; color: #4b3900; }
    .blue { background: #3b82f6; }
    .white { background: #fff; color: #334155; }
    .black { background: #111827; }
    .green { background: #22c55e; }

    .lab {
      display: grid;
      grid-template-rows: auto auto minmax(92px, .8fr) minmax(92px, .8fr) auto;
      gap: 10px;
    }

    .challenge {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: var(--radius-lg);
      background: rgba(255,255,255,.7);
      border: 2px dashed rgba(23, 50, 77, .16);
    }

    .challenge p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.45;
      font-weight: 900;
    }

    .target-color {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      border: 5px solid white;
      box-shadow: 0 8px 16px rgba(23, 50, 77, .16);
    }

    .feedback {
      min-height: 44px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 9px 12px;
      border-radius: var(--radius-lg);
      background: rgba(255,255,255,.72);
      border: 1px solid var(--line);
      color: var(--text);
      font-weight: 950;
      line-height: 1.35;
    }

    .mixing-zone {
      min-height: 0;
      border: 4px dashed rgba(23, 50, 77, .18);
      border-radius: var(--radius-xl);
      display: grid;
      place-items: center;
      padding: 10px;
      background: rgba(255,255,255,.58);
      transition: border-color 180ms ease, background 180ms ease, transform 180ms ease;
    }

    .mixing-zone.is-over {
      border-color: #3b82f6;
      background: rgba(59,130,246,.12);
      transform: scale(1.01);
    }

    .empty-note {
      text-align: center;
      color: var(--muted);
      font-weight: 950;
      line-height: 1.4;
    }

    .dropped-colors {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      align-items: stretch;
    }

    .small-drop {
      min-height: 72px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      color: white;
      font-weight: 950;
      border: 4px solid white;
      box-shadow: 0 10px 20px rgba(23, 50, 77, .16);
    }

    .small-drop.light-text {
      color: #334155;
    }

    .result-card {
      min-height: 0;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 7px;
      padding: 8px;
      border-radius: var(--radius-xl);
      background: rgba(255,255,255,.62);
      border: 1px solid var(--line);
    }

    .result-color {
      min-height: 0;
      border-radius: 22px;
      border: 5px solid white;
      background: linear-gradient(145deg, #ffffff, #e5e7eb);
      box-shadow: inset 0 0 0 1px rgba(23, 50, 77, .06), 0 12px 24px rgba(23, 50, 77, .14);
    }

    .result-text {
      text-align: center;
      line-height: 1.25;
    }

    .result-text strong {
      display: block;
      font-size: 1.12rem;
      font-weight: 950;
    }

    .result-text span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: .88rem;
      font-weight: 850;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .btn {
      border: 0;
      border-radius: 18px;
      padding: 11px 8px;
      color: white;
      background: #17324d;
      font-size: .92rem;
      font-weight: 950;
      box-shadow: 0 8px 16px rgba(23, 50, 77, .16);
      cursor: pointer;
    }

    .btn:active {
      transform: scale(.96);
    }

    .btn.success { background: #16a34a; }
    .btn.secondary { background: #64748b; }
    .btn.danger { background: #ef4444; }

    .ghost {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      width: 86px;
      height: 86px;
      border-radius: 26px;
      display: grid;
      place-items: center;
      color: white;
      font-weight: 950;
      box-shadow: 0 18px 30px rgba(0,0,0,.24);
      border: 5px solid white;
      transform: translate(-50%, -50%) rotate(-5deg);
    }

    .ghost.light-text {
      color: #334155;
    }

    @media (max-width: 760px) {
      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        position: fixed;
        inset: 0;
      }

      .app {
        width: 100%;
        height: 100dvh;
        min-height: 0;

      "yellow+yellow+yellow": {

};

    const challenges = Object.entries(recipes)
      .filter(([key]) => {
        const colors = key.split("+");
        return colors.length >= 2 && new Set(colors).size > 1;
      })
      .map(([key, recipe]) => ({
        key,
        target: recipe.name,
        hex: recipe.hex,
        recipe: key.split("+")
      }));

    const threeColorChallenges = challenges.filter(challenge => challenge.recipe.length === 3);
    const twoColorChallenges = challenges.filter(challenge => challenge.recipe.length === 2);

    const droppedColors = [];
    let currentChallenge = null;
    let score = 0;

    const palette = document.getElementById("palette");
    const mixingZone = document.getElementById("mixingZone");
    const droppedColorsEl = document.getElementById("droppedColors");
    const emptyNote = document.getElementById("emptyNote");
    const resultColor = document.getElementById("resultColor");
    const resultName = document.getElementById("resultName");
    const formula = document.getElementById("formula");
    const feedback = document.getElementById("feedback");
    const scoreEl = document.getElementById("score");
    const challengeText = document.getElementById("challengeText");
    const targetColor = document.getElementById("targetColor");
    const colorButtons = [...palette.querySelectorAll(".color-token")];

    function normalizeRecipe(colors) {
      return [...colors].sort().join("+");
    }

    function hexToRgb(hex) {
      const cleanHex = hex.replace("#", "");
      return {
        r: parseInt(cleanHex.slice(0, 2), 16),
        g: parseInt(cleanHex.slice(2, 4), 16),
        b: parseInt(cleanHex.slice(4, 6), 16)
      };
    }

    function rgbToHex(r, g, b) {
      const toHex = value => Math.max(0, Math.min(255, Math.round(value)))
        .toString(16)
        .padStart(2, "0");

      return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    function getFallbackMix(colors) {
      const rgbValues = colors.map(color => hexToRgb(colorHex[color]));
      const count = rgbValues.length;

      let r = rgbValues.reduce((sum, rgb) => sum + rgb.r, 0) / count;
      let g = rgbValues.reduce((sum, rgb) => sum + rgb.g, 0) / count;
      let b = rgbValues.reduce((sum, rgb) => sum + rgb.b, 0) / count;

      if (colors.includes("black")) {
        r *= 0.68;
        g *= 0.68;
        b *= 0.68;
      }

      if (colors.includes("white")) {
        r = r + (255 - r) * 0.22;
        g = g + (255 - g) * 0.22;
        b = b + (255 - b) * 0.22;
      }

      return {
        name: "لون مختلط",
        hex: rgbToHex(r, g, b),
        lesson: "هذه خلطة حرة."
      };
    }

    function getMixResult(colors) {
      const key = normalizeRecipe(colors);
      return recipes[key] || getFallbackMix(colors);
    }

    function setUsedColorsState() {
      colorButtons.forEach(button => {
        button.classList.toggle("is-used", droppedColors.includes(button.dataset.color));
      });
    }

    function renderDroppedColors() {
      droppedColorsEl.innerHTML = "";
      emptyNote.style.display = droppedColors.length ? "none" : "block";

      droppedColors.forEach((color, index) => {
        const drop = document.createElement("button");
        drop.type = "button";
        drop.className = "small-drop";
        drop.textContent = colorNames[color];
        drop.style.background = colorHex[color];
        drop.setAttribute("aria-label", `حذف ${colorNames[color]}`);

        if (color === "white" || color === "yellow") {
          drop.classList.add("light-text");
        }

        drop.addEventListener("click", () => {
          droppedColors.splice(index, 1);
          renderDroppedColors();
          updateMixPreview();
        });

        droppedColorsEl.appendChild(drop);
      });

      setUsedColorsState();
    }

    function addColor(color) {
      if (droppedColors.length >= 3) {
        feedback.textContent = "الحد الأقصى ثلاثة ألوان. اضغطي على لون في الوعاء لحذفه.";
        return;
      }

      droppedColors.push(color);
      renderDroppedColors();
      updateMixPreview();
      feedback.textContent = `أضفنا ${colorNames[color]}.`;
    }

    function updateMixPreview() {
      if (droppedColors.length < 2) {
        resultColor.style.background = "linear-gradient(145deg, #ffffff, #e5e7eb)";
        resultName.textContent = "اختاري لوناً آخر";
        formula.textContent = "الخلط يحتاج لونين على الأقل.";
        applyPageBackground(null);
        return null;
      }

      const result = getMixResult(droppedColors);
      const formulaText = droppedColors.map(color => colorNames[color]).join(" + ");

      resultColor.style.background = result.hex;
      resultName.textContent = result.name;
      formula.textContent = `${formulaText} = ${result.name}`;
      applyPageBackground(result);
      return result;
    }

    function sameRecipe(a, b) {
      return normalizeRecipe(a) === normalizeRecipe(b);
    }

    function adjustHexBrightness(hex, factor) {
      const rgb = hexToRgb(hex);
      return rgbToHex(rgb.r * factor, rgb.g * factor, rgb.b * factor);
    }

    function applyPageBackground(result) {
      if (!result || droppedColors.length < 2) {
        document.body.style.background = `
          radial-gradient(circle at 15% 12%, rgba(255,255,255,.45), transparent 30%),
          radial-gradient(circle at 90% 18%, rgba(255,255,255,.28), transparent 28%),
          linear-gradient(135deg, var(--bg-1), var(--bg-2))
        `;
        return;
      }

      const darkShade = adjustHexBrightness(result.hex, 0.74);
      const lightShade = adjustHexBrightness(result.hex, 1.18);

      document.body.style.background = `
        radial-gradient(circle at 15% 12%, rgba(255,255,255,.38), transparent 30%),
        radial-gradient(circle at 90% 18%, rgba(255,255,255,.22), transparent 28%),
        linear-gradient(135deg, ${lightShade}, ${darkShade})
      `;
    }

    function checkAnswer() {
      const result = updateMixPreview();

      if (droppedColors.length < 2) {
        feedback.textContent = "اختاري لونين أولاً.";
        return;
      }

      const selectedKey = normalizeRecipe(droppedColors);
      const acceptedByKey = selectedKey === currentChallenge.key;
      const acceptedByName = result.name === currentChallenge.target;

      if (acceptedByKey || acceptedByName) {
        score += 1;
        scoreEl.textContent = score;
        feedback.textContent = `صحيح: ${result.name}`;
        setTimeout(newChallenge, 850);
      } else {
        const hint = currentChallenge.recipe.map(color => colorNames[color]).join(" + ");
        feedback.textContent = `جرّبي: ${hint}`;
      }
    }

    function resetBowl() {
      droppedColors.length = 0;
      renderDroppedColors();
      updateMixPreview();
      applyPageBackground(null);
      feedback.textContent = "تم مسح الوعاء.";
    }

    function newChallenge() {
      const pool = Math.random() < 0.78 ? threeColorChallenges : twoColorChallenges;
      const next = pool[Math.floor(Math.random() * pool.length)];
      currentChallenge = next;
      const countText = next.recipe.length === 3 ? "من ٣ ألوان" : "من لونين";
      challengeText.textContent = `اصنعي ${next.target} ${countText}`;
      targetColor.style.background = next.hex;
      resetBowl();
      feedback.textContent = `التحدي: ${next.target}`;
    }

    function createGhost(token, x, y) {
      const ghost = document.createElement("div");
      ghost.className = "ghost";
      ghost.textContent = token.dataset.name;
      ghost.style.background = token.dataset.hex;

      if (token.dataset.color === "white" || token.dataset.color === "yellow") {
        ghost.classList.add("light-text");
      }

      document.body.appendChild(ghost);
      moveGhost(ghost, x, y);
      return ghost;
    }

    function moveGhost(ghost, x, y) {
      ghost.style.left = `${x}px`;
      ghost.style.top = `${y}px`;
    }

    function isInsideMixingZone(x, y) {
      const rect = mixingZone.getBoundingClientRect();
      return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
    }

    function setupPointerDrag(token) {
      let ghost = null;
      let dragging = false;
      let pointerId = null;
      let startX = 0;
      let startY = 0;
      let moved = false;

      token.addEventListener("pointerdown", event => {
        dragging = true;
        pointerId = event.pointerId;
        startX = event.clientX;
        startY = event.clientY;
        moved = false;
        token.setPointerCapture(pointerId);
        ghost = createGhost(token, event.clientX, event.clientY);
      });

      token.addEventListener("pointermove", event => {
        if (!dragging || event.pointerId !== pointerId || !ghost) return;

        const distance = Math.hypot(event.clientX - startX, event.clientY - startY);
        if (distance > 8) moved = true;

        moveGhost(ghost, event.clientX, event.clientY);
        mixingZone.classList.toggle("is-over", isInsideMixingZone(event.clientX, event.clientY));
      });

      token.addEventListener("pointerup", event => {
        if (!dragging || event.pointerId !== pointerId) return;

        const droppedInside = isInsideMixingZone(event.clientX, event.clientY);
        dragging = false;
        pointerId = null;
        mixingZone.classList.remove("is-over");

        if (ghost) {
          ghost.remove();
          ghost = null;
        }

        if (droppedInside || !moved) {
          addColor(token.dataset.color);
        }
      });

      token.addEventListener("pointercancel", () => {
        dragging = false;
        pointerId = null;
        mixingZone.classList.remove("is-over");
        if (ghost) ghost.remove();
        ghost = null;
      });
    }

    colorButtons.forEach(setupPointerDrag);

    document.getElementById("checkBtn").addEventListener("click", checkAnswer);
    document.getElementById("mixBtn").addEventListener("click", () => {
      const result = updateMixPreview();
      feedback.textContent = result ? result.lesson : "اختاري لونين.";
    });
    document.getElementById("resetBtn").addEventListener("click", resetBowl);
    document.getElementById("newChallengeBtn").addEventListener("click", newChallenge);

    newChallenge();
  </script>
